openapi: 3.0.0
info:
  title: Jobs API
  description: A management API for job applications (GUC Project)
  version: 1.0.0
servers:
  - url: https://zero6-jobs-api-ac4z.onrender.com/api/v1
    description: Production Server (Render)
  - url: http://localhost:3000/api/v1
    description: Local Development

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '201': { description: Created }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Success }

  /jobs:
    get:
      tags: [Jobs]
      summary: Get all user jobs
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: List of jobs }
    post:
      tags: [Jobs]
      summary: Create a new job
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company, position]
              properties:
                company: { type: string }
                position: { type: string }
      responses:
        '201': { description: Job Created }

  /jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a single job
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job found }
    patch:
      tags: [Jobs]
      summary: Update a job
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                company: { type: string }
                position: { type: string }
                status: { type: string, enum: [interview, declined, pending] }
      responses:
        '200': { description: Job updated }
    delete:
      tags: [Jobs]
      summary: Delete a job
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job deleted }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT