openapi: 3.0.0
info:
  title: Jobs API
  version: 1.0.0
servers:
  - url: https://zero6-jobs-api-ac4z.onrender.com/api/v1
paths:
  /auth/register:
    post:
      summary: Register User
      responses:
        '201':
          description: User created successfully
        '400':
          description: Missing name, email, or password
  /jobs:
    get:
      summary: Get all user jobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '401':
          description: No token provided
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT