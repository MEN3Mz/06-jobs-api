openapi: 3.0.0
info:
  title: Jobs API
  description: A management API for job applications
  version: 1.0.0
servers:
  - url: https://zero6-jobs-api-ac4z.onrender.com/api/v1
paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        201:
          description: Created
  /jobs:
    get:
      summary: Get all jobs
      security:
        - bearerAuth: []
      responses:
        200:
          description: Success
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT